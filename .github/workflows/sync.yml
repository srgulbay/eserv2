name: Suno playlist sync

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: playlist-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync playlist and rebuild site
        run: python scripts/sync.py

      - name: Commit and push if changed
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git -c user.name="playlist-bot" -c user.email="playlist-bot@users.noreply.github.com" \
              commit -m "sync: update playlist"
            git push
          fi
